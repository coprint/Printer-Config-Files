# F001
# Printer_size: 220x220x250
# Version: v1.8.1
# CreateDate: 2023/09/01
# Nozzle_mcu: chip: GD32F303CBT6
#             version: CR-K1-MAX-NOZZLE-V1.0.0
# Leveling_mcu: chip: GD32E230F8P6
#             version: CR-K1-MAX-LEVELING-V1.0.0
# mcu: chip: GD32F303RET6
#      version: CR4CU220812S12

#---------------COPRINT
# Modified for CoPrint KCM Set and ChromaHead
# Usable build size X=215 Y=200 Z=265
#
# Ver 0.2
# Date 21/01/2025


[include sensorless.cfg]
[include gcode_macro.cfg]
[include printer_params.cfg]
#[include Helper-Script/useful-macros.cfg]
[include chroma_head.cfg]
[include kcm.cfg]
[include bed_mesh.cfg]
# [include input_shaper.cfg]
# [include external_inputshaper.cfg]
#[include ecm_1.cfg]
#[include ecm_2.cfg]
#[include ecm_3.cfg]
#[include ecm_4.cfg]
[include cp_macro.cfg]

[mcu]
serial: /dev/ttyS7
baud: 230400
restart_method: command

#[safe_z_home]
#home_xy_position: 147, 154
#speed: 75
#z_hop: 10
#z_hop_speed: 2

#[mcu nozzle_mcu]
#serial: /dev/ttyS1
#baud: 230400
#restart_method: command

[mcu leveling_mcu]
serial: /dev/ttyS9
baud: 230400
restart_method: command

[gap_auto_comp]
#show_msg: True
x_gaps: 0.05
y_gaps: 0
z_gaps: 0

[prtouch_v2]
pr_version: 1
step_base: 2
z_offset: 0
noz_ex_com: 0.04
tilt_corr_dis: 0
tri_min_hold: 2500
tri_max_hold: 6000
pres_cnt: 4
pres0_clk_pins: leveling_mcu:PB13
pres0_sdo_pins: leveling_mcu:PB12
pres1_clk_pins: leveling_mcu:PB15
pres1_sdo_pins: leveling_mcu:PB14
pres2_clk_pins: leveling_mcu:PA9
pres2_sdo_pins: leveling_mcu:PA8
pres3_clk_pins: leveling_mcu:PA11
pres3_sdo_pins: leveling_mcu:PA10
step_swap_pin: mcu:PC10
pres_swap_pin: leveling_mcu:PA12
g28_wait_cool_down: true
pa_clr_down_mm: -0.15
rdy_xy_spd:400
clr_noz_start_x: 85
clr_noz_start_y: 219
clr_noz_len_x: 50
clr_noz_len_y: 2
speeds: 2.5,1.0
tri_hftr_cut: 2,1
tri_lftr_k1: 0.70,0.30
tri_try_max_times: 10
tri_min_hold: 2500,20000
tri_max_hold: 6000,60000
need_self_check:false

# correct_tri_hold: 6000
# correct_step_mm: 0.02
z_high_default: -264.0
min_z_pos: -250
retract_z_dist: 250
retract_z_speed: 3600

# [filament_switch_sensor filament_sensor_2]
# pause_on_runout: true
# switch_pin: nozzle_mcu:PA1
#[filament_switch_sensor filament_sensor]
#pause_on_runout: true
#switch_pin: !PC15

#[verify_heater extruder]
#check_gain_time:30

[verify_heater heater_bed]
check_gain_time:120
heating_gain: 1.0
hysteresis: 10

#[mcu rpi]
#serial: /tmp/klipper_host_mcu

#[bl24c16f]
#i2c_mcu: rpi
#i2c_bus: i2c.2
#i2c_speed: 400000

[idle_timeout]
timeout: 99999999

[virtual_sdcard]
path: /usr/data/printer_data/gcodes

[gcode_arcs]
resolution: 1.0

[duplicate_pin_override]
pins:PC6
[temperature_fan soc_fan]
pin:PB2
sensor_type: temperature_mcu
control:watermark
kick_start_time:0.500
shutdown_speed:0
off_below:0.1
target_temp:45
min_temp:-15
max_temp:100
max_speed:1
min_speed:0.3
tachometer_pin:PC6
# [output_pin soc_fan]
# pin: PB2
# pwm: True
# cycle_time: 0.0100
# hardware_pwm: false
# value: 0.00
# scale: 255
# shutdown_value: 0.0

[stepper_x]
step_pin:PC2
dir_pin:PB9
enable_pin:!PC3
microsteps:32
rotation_distance:39.94
endstop_pin:tmc2209_stepper_x:virtual_endstop
#endstop_pin:PA5
position_endstop:-19
position_min:-20
position_max:210
homing_speed:60
homing_retract_dist:0 #10

[tmc2209 stepper_x]
uart_pin:PA9
driver_SGTHRS: 115
uart_address:3
interpolate: true
run_current:1.5
sense_resistor: 0.10
stealthchop_threshold: 0
diag_pin: ^PB12
driver_TBL: 1
driver_TOFF: 2
driver_HEND: 2
driver_HSTRT: 4

[stepper_y]
step_pin: PB8
dir_pin: PB7
enable_pin: !PC3
microsteps: 32
rotation_distance: 40
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: -30
position_min: -35
position_max: 215
homing_speed: 30
homing_retract_dist:0

[tmc2209 stepper_y]
uart_pin:PA10
driver_SGTHRS: 78
uart_address:3
interpolate: true
run_current:1.5
sense_resistor: 0.10
stealthchop_threshold: 0
diag_pin: ^PB13
driver_TBL: 1
driver_TOFF: 2
driver_HEND: 2
driver_HSTRT: 4

[stepper_z]
step_pin: PB6
dir_pin: PB5
enable_pin: !PC3
microsteps: 32
rotation_distance:39.94
#endstop_pin: tmc2209_stepper_z:virtual_endstop
endstop_pin: probe:z_virtual_endstop
#endstop_pin:PA15
#position_endstop: 268
position_min: -10
position_max: 275
homing_speed: 60
homing_retract_dist:0 #10

[tmc2209 stepper_z]
uart_pin:PA11
driver_SGTHRS: 80
uart_address:3
interpolate: true
run_current:1.5
#hold_current:1.5
sense_resistor: 0.10
stealthchop_threshold: 0
diag_pin: ^PB14
driver_TBL: 1
driver_TOFF: 2
driver_HEND: 2
driver_HSTRT: 4

